<div class="table-responsive mat-elevation-z4">

  <table mat-table [dataSource]="dataSource">

    <ng-container
      *ngFor="let col of columns"
      [matColumnDef]="col.key">

      <!-- HEADER -->
      <th
        mat-header-cell
        *matHeaderCellDef
        [class.action-column]="isActionColumn(col)">
        {{ col.label }}

      </th>
      <!-- CELL --> 
      <td
        mat-cell
        *matCellDef="let element"
        [class.action-column]="isActionColumn(col)">

        <!-- TEXT -->
        <span *ngIf="col.type === 'text' || !col.type">
          {{ element[col.key] }}
        </span>

        <!-- CHIP -->
        <span
          *ngIf="col.type === 'chip'"
          class="status-chip"
          [ngClass]="col.valueMap?.[element[col.key]]?.class">

          {{
            col.valueMap?.[element[col.key]]?.label
            || element[col.key]
          }}

        </span>

        <!-- ACTIONS -->
        <div *ngIf="col.type === 'action'" class="action-buttons">

          <!-- PRINT -->
          <button
            *ngIf="col.actions?.includes('print')"
            mat-icon-button
            class="action-btn print"
            matTooltip="Štampaj"
            (click)="printAction(element)">

            <mat-icon>print</mat-icon>
          </button>

          <button
            *ngIf="col.actions?.includes('edit')"
            mat-icon-button
            class="action-btn edit"
            matTooltip="Uredi"
            (click)="editAction(element)">

            <mat-icon>edit</mat-icon>
          </button>

          <!-- DELETE -->
          <button
            *ngIf="col.actions?.includes('delete')"
            mat-icon-button
            color="warn" 
            matTooltip="Obriši"
            (click)="deleteAction(element)">
            
            <mat-icon>delete</mat-icon>

          </button>

          <!-- UNDO -->
          <button
            *ngIf="col.actions?.includes('undo')"
            mat-icon-button
            color="accent"
            matTooltip="Storniraj"
            (click)="undoAction(element)">

            <mat-icon>undo</mat-icon>

          </button>

        </div>

      </td>

    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons="">
  </mat-paginator>
</div>
