<mat-drawer-container class="container">

  <mat-drawer #drawer mode="over" position="end" class="drawer">

    <div class="drawer-header">
      <h2>
        {{ isEditMode ? 'Uredi zaposlenog' : 'Novi profil zaposlenog' }}
      </h2>
    </div>

    <form #zaposleniForm="ngForm">

      <div class="form-grid">
        
        <mat-form-field appearance="outline">

          <mat-label>Ime</mat-label>

          <input
            matInput
            name="ime"
            required
            minlength="2"
            [(ngModel)]="noviZaposleni.ime"
            #ime="ngModel">

          <mat-error *ngIf="ime.errors?.['required']">
            Ime je obavezno 
          </mat-error>

          <mat-error *ngIf="ime.errors?.['minlength']">
            Minimum 2 karaktera
          </mat-error>

        </mat-form-field>
        
        <mat-form-field appearance="outline">

          <mat-label>Prezime</mat-label>

          <input
            matInput
            name="prezime"
            required
            minlength="2"
            [(ngModel)]="noviZaposleni.prezime"
            #prezime="ngModel">

          <mat-error *ngIf="prezime.errors?.['required']">
            Prezime je obavezno
          </mat-error>

          <mat-error *ngIf="prezime.errors?.['minlength']">
            Minimum 2 karaktera
          </mat-error>

        </mat-form-field>
        
        <mat-form-field appearance="outline">

          <mat-label>Uloga / Tip</mat-label>
          <mat-select
            name="tip"
            required
            [(ngModel)]="noviZaposleni.tip"
            #tip="ngModel">
            
            <mat-option value="G">Glumac</mat-option>
            <mat-option value="R">Reditelj</mat-option>
            <mat-option value="K">Kostimograf</mat-option>

          </mat-select>

          <mat-error *ngIf="tip.errors?.['required']">
            Odaberite ulogu
          </mat-error>

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Pozorište</mat-label>

          <mat-select
            name="pozoristeId"
            required
            [(ngModel)]="noviZaposleni.pozoristeId"
            #pozoriste="ngModel">

            <mat-option
              *ngFor="let p of (pozorista$ | async) ?? []"
              [value]="p.id">

              {{ p.naziv }}

            </mat-option>

          </mat-select>

          <mat-error *ngIf="pozoriste.errors?.['required']">
            Odaberite pozorište 
          </mat-error>

        </mat-form-field>

      </div>

      <div class="actions">

        <button
          mat-raised-button
          color="primary"
          [disabled]="zaposleniForm.invalid"
          (click)="sacuvaj(); drawer.close()">

          {{ isEditMode ? 'SAČUVAJ IZMJENE' : 'DODAJ ZAPOSLENOG' }}

        </button>

      </div>

    </form>

  </mat-drawer>

  <div class="content">

    <div class="toolbar">

      <button
        mat-raised-button
        color="primary"
        (click)="otvoriZaDodavanje()">

        <mat-icon>add</mat-icon>
        Novi zaposleni

      </button>

    </div>

    <app-table
      [data]="(zaposleni$ | async) ?? []"
      [columns]="cols"
      (onEdit)="handleEdit($event)"
      (onDelete)="handleDelete($event)">
    </app-table>

  </div>
</mat-drawer-container>
