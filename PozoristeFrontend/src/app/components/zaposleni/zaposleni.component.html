<div class="ansambl-page">
  <header class="page-header">
    <div class="label-utility">Organizaciona Struktura</div>
    <h1 class="font-serif italic">Ansambl</h1>
  </header>

  <!-- SEKCIJA: REDITELJI -->
  <section class="role-section">
    <header class="section-header">
      <div class="title-group">
        <h2 class="font-serif">Reditelji</h2>
        <span class="count" *ngIf="reditelji$ | async as r">{{ r.length }}</span>
      </div>
      <button class="add-link" (click)="prikaziFormu('R')">+ DODAJ</button>
    </header>

    <!-- INLINE FORMA -->
    <div class="inline-form" *ngIf="activeAddType === 'R'">
      <input type="text" [(ngModel)]="noviZaposleni.ime" placeholder="Ime i prezime" class="editorial-input">
      <button class="save-btn" (click)="sacuvaj()">SAČUVAJ</button>
      <button class="cancel-btn" (click)="activeAddType = null"><mat-icon>close</mat-icon></button>
    </div>

      <div class="names-grid">
        <div class="name-item" *ngFor="let z of (reditelji$ | async)" [class.is-editing]="editingId === z.id">

          <ng-container *ngIf="editingId !== z.id">
            <span class="name" (click)="handleEdit(z)">{{ z.imePrezime }}</span>
            <div class="item-actions">
              <button class="edit-btn" (click)="handleEdit(z)"><mat-icon>edit</mat-icon></button>
              <button class="delete-btn" (click)="obrisi(z.id)">×</button>
            </div>
          </ng-container>
          
          <div class="edit-row" *ngIf="editingId === z.id">
            <input type="text" [(ngModel)]="editModel.ime" class="edit-input-small" placeholder="Ime">
            <input type="text" [(ngModel)]="editModel.prezime" class="edit-input-small" placeholder="Prezime">
            <button class="mini-save-btn" (click)="sacuvajIzmjenu()">OK</button>
            <button class="mini-cancel-btn" (click)="odustaniOdIzmjene()">×</button>
          </div>

        </div>
      </div>
  </section>
